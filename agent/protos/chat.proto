// protos/chat.proto
syntax = "proto3";

package chat;

// 
option csharp_namespace = "AgentApp.Protos";

// 
service AgentService {
  rpc StreamChat (ChatRequest) returns (stream ChatResponse);
}

//
message ChatRequest {
  string user_id = 1;
  string session_id = 2;
  string prompt = 3;
}

// 
message ChatResponse {
  string chunk = 1;
  Receipt receipt = 2; 
}

// 
message Receipt {
  string session_id = 1;
  int64 timestamp = 2;
  string response_hash = 3; 
  string signature = 4;     
  string key_id = 5;
}