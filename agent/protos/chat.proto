// protos/chat.proto
syntax = "proto3";

package chat;

option csharp_namespace = "AgentApp.Protos";

service AgentService {
  rpc StreamChat (ChatRequest) returns (stream ChatResponse);
  rpc UpdateProviderConfig (ProviderConfigRequest) returns (ProviderConfigResponse);
}

message ChatRequest {
  string user_id = 1;
  string session_id = 2;
  string prompt = 3;
}

message ChatResponse {
  string chunk = 1;
  Receipt receipt = 2; 
}

message Receipt {
  string session_id = 1;
  int64 timestamp = 2;
  string response_hash = 3; 
  string signature = 4; 
  string key_id = 5;        
}

message ProviderConfigRequest {
  string user_id = 1;
  optional string llm_provider = 2;
  optional string api_key = 3;
  optional string base_url = 4;
  optional string tier1_model = 5;
  optional string tier2_model = 6;
  optional string tier3_model = 7;
}

message ProviderConfigResponse {
  bool success = 1;
  string message = 2;
}