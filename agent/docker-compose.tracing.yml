version: '3.8'

services:
  langfuse_db:
    image: postgres:16-alpine
    container_name: langfuse_postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - agent_network

  langfuse_server:
    image: langfuse/langfuse:2
    container_name: langfuse_server
    depends_on:
      langfuse_db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://langfuse:secretpassword@langfuse_db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=supersecretnextauthstring32charslong!!!
      - SALT=supersecretsaltstring
      - TELEMETRY_ENABLED=false
    restart: always
    networks:
      - agent_network

volumes:
  langfuse_pgdata:

networks:
  agent_network:
    name: agent_network
    driver: bridge